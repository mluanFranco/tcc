<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Sorvetes | Produto</title>
    <link rel="stylesheet" href="/frontend/css/produto-style.css">

    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Padauk:wght@400;700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="sidebar">
        <div class="secao-geral">
            <h2>Geral</h2>
            <div class="dashboard">
                <img src="/frontend/assets/icons/dashboard-icone.png" alt="Icone de dashboard">
                <a href="/frontend/pages/dashboard.html">Dashboard</a>
            </div>
        </div>

        <div class="barra-horizontal"></div>

        <div class="secao-cadastro">
            <h2>Cadastro</h2>
            <div class="produto">
                <img src="/frontend/assets/icons/produto-icone.png" alt="Icone de produto">
                <a href="/frontend/pages/produto.html">Produto</a>
            </div>

            <div class="cliente">
                <img src="/frontend/assets/icons/cliente-icone.png" alt="Icone de cliente">
                <a href="">Cliente</a>
            </div>

            <div class="fornecedor">
                <img src="/frontend/assets/icons/fornecedor-icone.png" alt="Icone de fornecedor">
                <a href="">Fornecedor</a>
            </div>
        </div>

        <div class="barra-horizontal"></div>

        <div class="secao-pedido">
            <h2>Pedido</h2>
            <div class="pedido-compra">
                <img src="/frontend/assets/icons/pedido-compra-icone.png" alt="Icone de pedido de compra">
                <a href="">Pedido de Compra</a>
            </div>

            <div class="pedido-venda">
                <img src="/frontend/assets/icons/pedido-venda-icone.png" alt="Icone pedido de venda">
                <a href="">Pedido de Venda</a>
            </div>
        </div>
    </div>

    <main>
        <div class="titulo-cadastro">
            <h2>Cadastro de Produtos</h2>
        </div>

        <div class="campo-cadastro">
            <form action="">
                <div class="primeira-secao">
                    <div class="campo-produto">
                        <label for="">Nome</label>
                        <input type="text" id="nome">
                    </div>

                    <div class="campo-descricao">
                        <label for="descricao">Descrição</label>
                        <input type="text" id="descricao">
                    </div>
                </div>

                <div class="segunda-secao">
                    <div class="campo-categoria">
                        <label for="categoria">Categoria</label>
                        <select name="" id="categoria">
                            <option value="">Escolher categoria</option>
                            <option value="teste-1">Insumo</option>
                        </select>
                    </div>

                    <div class="campo-unidade-medida">
                        <label for="unidade-medida">Unidade de Medida</label>
                        <select name="" id="unidade-medida">
                            <option value="">Escolher Unidade de Medida</option>
                            <option value="opt-litro">Litro</option>
                        </select>
                    </div>
                </div>

                <div class="terceira-secao">
                    <div class="campo-preco-custo">
                        <label for="preco-custo">Preço de Custo</label>
                        <input type="text" id="preco-custo">
                    </div>

                    <div class="campo-preco-venda">
                        <label for="preco-venda">Preço de Venda</label>
                        <input type="text" id="preco-venda">
                    </div>

                    <div class="campo-estoque-minimo">
                        <label for="estoque-minimo">Estoque Mínimo</label>
                        <input type="text" id="estoque-minimo">
                    </div>
                </div>

                <div class="campo-botoes">
                    <button type="submit" class="btn-cadastrar">Cadastrar</button>
                    <button type="reset" class="btn-limpar">Limpar</button>
                </div>
            </form>
        </div>

        <div class="grid-cadastrados">

        </div>
    </main>
</body>

</html>
