<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Sorvetes | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/frontend/css/style.css">
</head>

<body>

    <div class="bolha-extra"></div>

    <div class="card">
        <div class="card-topo"></div>

        <div class="logo-wrapper">
            <div class="logo-circulo">
                <div class="logo-text">
                    <img src="/frontend/assets/images/logo-novasorvetes.png" width="80">
                    <span class="nova">Nova</span>
                    <span class="sorvetes">Sorvetes</span>
                </div>
            </div>
        </div>

        <h1 class="titulo">Bem-vindo de volta!</h1>
        <p class="subtitulo">Acesse o painel de gestão</p>

        <form action="" method="post">
            <div class="campo">
                <label for="usuario">Usuário</label>
                <input type="text" id="usuario" name="usuario" placeholder="Digite seu usuário">
            </div>
            <div class="campo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="••••••••">
            </div>
            <button type="submit" class="btn-entrar">
                <span>Entrar</span>
            </button>
        </form>

        <p class="rodape">© 2025 Nova Sorvetes. Todos os direitos reservados.</p>
    </div>

</body>

</html>
